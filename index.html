<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Connect - Community Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #0d1117; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: #fff; 
            overflow: hidden; 
        }

        /* অ্যাড সাইজ প্রায় অর্ধেক করার জন্য এবং পলিসি বজায় রাখার জন্য */
        .external-ad-box {
            width: 100%;
            height: 40px; /* উচ্চতা কমানো হয়েছে */
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Scale 0.6 মানে এটি মূল সাইজের ৬০% দেখাবে, যা প্রায় অর্ধেক */
            transform: scale(0.65); 
            transform-origin: center;
        }

        .container { 
            width: 92%; 
            max-width: 380px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.04); 
            padding: 40px 20px; 
            border-radius: 30px; 
            border: 1px solid #ff69b4; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }
        
        .match-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto 25px; }
        .match-area { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #ff69b4; box-shadow: 0 0 20px rgba(255, 105, 180, 0.4); overflow: hidden; display: flex; align-items: center; justify-content: flex-start; }
        
        .active-dot { 
            position: absolute; bottom: 10px; right: 10px; width: 22px; height: 22px; 
            background: #22c55e; border: 3px solid #0d1117; border-radius: 50%; 
            z-index: 10; display: none; 
        }

        .profile-slider { display: flex; width: 1400px; height: 100%; will-change: transform; transition: transform 0.1s linear; }
        .profile-slider img { width: 140px; height: 140px; object-fit: cover; border-radius: 50%; flex-shrink: 0; }
        
        h1 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
        #match-status { color: #ff69b4; font-weight: 600; font-size: 17px; margin-bottom: 25px; height: 26px; }
        .online-text { color: #22c55e; font-size: 14px; display: none; margin-top: -20px; margin-bottom: 20px; font-weight: 500; }

        .btn-chat { width: 100%; background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%); color: white; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3); animation: pulse-btn 1.5s infinite; }
        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .loader { border: 3px solid rgba(255, 255, 255, 0.2); border-top: 3px solid #ff69b4; border-radius: 50%; width: 25px; height: 25px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- বক্সের বাইরে ছোট সাইজের ব্যানার -->
    <div class="external-ad-box">
        <script type="text/javascript">
            atOptions = {
                'key' : '25ef1589e1cf5779ebd8a1dda463b14c',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/25ef1589e1cf5779ebd8a1dda463b14c/invoke.js"></script>
    </div>

    <div class="container">
        <div class="match-wrapper">
            <div class="active-dot" id="activeDot"></div>
            <div class="match-area">
                <div class="profile-slider" id="slider">
                    <img src="p1.webp" loading="eager">
                    <img src="p2.webp" loading="eager">
                    <img src="p3.webp" loading="eager">
                    <img src="p4.webp" loading="eager">
                    <img src="p5.webp" loading="eager">
                    <img src="p6.webp" loading="eager">
                    <img src="p7.webp" loading="eager">
                    <img src="p8.webp" loading="eager">
                    <img src="p9.webp" loading="eager">
                    <img src="p10.webp" loading="eager">
                </div>
            </div>
        </div>
        <h1 id="title">Finding New Friends...</h1>
        <div id="match-status"><div class="loader"></div></div>
        <div class="online-text" id="onlineIndicator"><i class="fa-solid fa-circle" style="font-size: 10px;"></i> Online Now</div>
        <button id="chatBtn" class="btn-chat" onclick="handleStartChat()">
            <i class="fa-brands fa-facebook-messenger"></i> START CHAT NOW
        </button>
    </div>

    <script>
        const TARGET_URL = 'safeoffers.pro/a/RozKiOzWhOXLZ'; 
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxo8ZyK3hi3-dfFaSu-_ZbUDPudyXMWdAN5LCI92to2qTUEjVTp7B4Yshp44sgEXwjm/exec';
        function sendEvent(type) { new Image().src = SCRIPT_URL + "?event=" + type; }
        const slider = document.getElementById('slider');
        const statusText = document.getElementById('match-status');
        const title = document.getElementById('title');
        const chatBtn = document.getElementById('chatBtn');
        const activeDot = document.getElementById('activeDot');
        const onlineIndicator = document.getElementById('onlineIndicator');
        let position = 0;
        let count = 0;
        const interval = setInterval(() => {
            position -= 140;
            if (position <= -1400) position = 0;
            slider.style.transform = `translateX(${position}px)`;
            count++;
            if (count > 25) { 
                clearInterval(interval);
                finalizeMatch();
            }
        }, 110);
        function finalizeMatch() {
            const targetPos = -560; 
            slider.style.transition = "transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)";
            slider.style.transform = `translateX(${targetPos}px)`;
            setTimeout(() => {
                title.innerText = "Congratulations! 🥳";
                statusText.innerHTML = "<span style='color:#ff69b4;'>Your Free Match Found!</span>";
                activeDot.style.display = "block";
                onlineIndicator.style.display = "block";
                chatBtn.style.display = "flex";
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 } });
                sendEvent('Fixed_Match_Found');
            }, 800);
        }
        window.onload = () => { sendEvent('Total_Visit'); };
        function handleStartChat() {
            sendEvent('Button_Click');
            const isAndroid = /Android/i.test(navigator.userAgent);
            const chromeIntent = `intent://${TARGET_URL}#Intent;scheme=https;package=com.android.chrome;end`;
            setTimeout(() => { window.location.href = isAndroid ? chromeIntent : `https://${TARGET_URL}`; }, 300);
        }
    </script>
</body>
</html>
